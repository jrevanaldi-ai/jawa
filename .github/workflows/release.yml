#
# On every push to main, if `version` in build.gradle.kts is non-SNAPSHOT and the
# matching `v<version>` tag does not yet exist, create the tag and a GitHub Release.
# JitPack picks the tag up on the next consumer request — no manual release step.
name: release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag and release if version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -oP 'version = "\K[^"]+' build.gradle.kts | head -1)
          if [[ -z "$VERSION" ]]; then
            echo "::error::no version line found in build.gradle.kts"; exit 1
          fi
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "version $VERSION is SNAPSHOT — skip release"; exit 0
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists — skip release"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes
